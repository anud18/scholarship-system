apiVersion: 1
# Application log-based alerts (Loki).
#
# These rules query Loki tenants instead of Prometheus, so they catch
# things metrics can't see: stack traces, application-level ERROR lines,
# unhandled exceptions. They go through the same notification policy as
# Prometheus alerts, so a firing rule eventually opens / updates a GitHub
# issue via the repository_dispatch webhook.
#
# Grafana alert pipeline for Loki count_over_time queries needs three
# stages: A (query) -> B (reduce last) -> C (threshold). Without the
# reducer, evaluation fails with "looks like time series data, only
# reduced data can be alerted on."
groups:
  - orgId: 1
    name: application_logs
    folder: Alerts
    interval: 1m
    rules:
      - uid: alert-backend-error-spike
        title: BackendErrorSpike
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki-staging-uid
            model:
              datasource:
                type: loki
                uid: loki-staging-uid
              expr: |
                sum(count_over_time({environment="staging", container=~"scholarship_backend.*"} |~ "(?i)\\bERROR\\b" [5m]))
              refId: A
              queryType: instant
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: warning
          category: application
          environment: staging
        annotations:
          summary: "Backend error log spike (>5/5min) on {{ $labels.environment }}"
          description: "scholarship_backend has emitted more than 5 ERROR-level log lines in the last 5 minutes. Investigate via Loki: {environment=\"staging\", container=~\"scholarship_backend.*\"} |~ \"ERROR\""
        isPaused: false

      - uid: alert-backend-traceback
        title: BackendUnhandledTraceback
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki-staging-uid
            model:
              datasource:
                type: loki
                uid: loki-staging-uid
              expr: |
                sum(count_over_time({environment="staging", container=~"scholarship_backend.*"} |= "Traceback (most recent call last)" [5m]))
              refId: A
              queryType: instant
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: high
          category: application
          environment: staging
        annotations:
          summary: "Backend Python traceback detected on {{ $labels.environment }}"
          description: "An unhandled Python exception traceback appeared in the backend logs. Open Loki and search: {environment=\"staging\", container=~\"scholarship_backend.*\"} |= \"Traceback\""
        isPaused: false

      - uid: alert-postgres-error-log
        title: PostgresErrorLog
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki-staging-uid
            model:
              datasource:
                type: loki
                uid: loki-staging-uid
              expr: |
                sum(count_over_time({environment="staging", container="scholarship_postgres_staging"} |~ "(?i)\\b(ERROR|FATAL)\\b" [5m]))
              refId: A
              queryType: instant
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params: [3]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: warning
          category: database
          environment: staging
        annotations:
          summary: "Postgres ERROR/FATAL log spike on {{ $labels.environment }}"
          description: "scholarship_postgres_staging emitted >3 ERROR/FATAL lines in 5 minutes. Inspect via Loki: {environment=\"staging\", container=\"scholarship_postgres_staging\"} |~ \"ERROR|FATAL\""
        isPaused: false
