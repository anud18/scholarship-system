version: '3.8'

services:
  # PostgreSQL Database for Production
  postgres:
    image: postgres:15-alpine
    container_name: scholarship_postgres_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scholarship_db}
      POSTGRES_USER: ${POSTGRES_USER:-scholarship_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - postgres_backups:/backups
      - ./database-init:/docker-entrypoint-initdb.d:ro
    networks:
      - scholarship_prod_db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scholarship_user} -d ${POSTGRES_DB:-scholarship_db}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # RustFS Object Storage for Production (S3-compatible MinIO replacement;
  # service keeps the `minio` name so the backend's MINIO_ENDPOINT and the
  # monitoring probe target stay unchanged).
  #
  # CUTOVER (docs/deployment/rustfs-migration-runbook.md): RustFS cannot read
  # MinIO's on-disk erasure format. Before this block goes live, mirror the
  # data into /opt/scholarship/rustfs/data with
  # scripts/migrate_storage_to_rustfs.sh (backend stopped for the final delta
  # run). Confirm the real prod bucket name with `mc ls` first — the old
  # compose set a dead MINIO_BUCKET_NAME env, so the backend has been using
  # the config default "scholarship-files".
  #
  # TLS gate: MinIO served TLS from minio_config/certs when present. RustFS
  # reads certs from RUSTFS_TLS_PATH instead. If the prod backend really runs
  # MINIO_SECURE=true against this host, provision /opt/scholarship/rustfs/certs
  # and uncomment the two TLS lines below BEFORE cutover — do not drop the old
  # minio_config volume until the cert story is replaced.
  minio:
    image: rustfs/rustfs:1.0.0-beta.8
    container_name: scholarship_rustfs_prod
    environment:
      RUSTFS_ACCESS_KEY: ${MINIO_ROOT_USER}
      RUSTFS_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      RUSTFS_VOLUMES: /data
      # RUSTFS_TLS_PATH: /certs
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # RustFS web console
    volumes:
      - rustfs_prod_data:/data
      # - /opt/scholarship/rustfs/certs:/certs:ro
    networks:
      - scholarship_prod_db_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # Note: Redis moved to AP-VM to maintain consistent architecture with staging

  # Database Backup Service
  postgres-backup:
    image: postgres:15-alpine
    container_name: scholarship_postgres_backup
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-scholarship_db}
      POSTGRES_USER: ${POSTGRES_USER:-scholarship_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}  # Daily at 2 AM
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - postgres_backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - scholarship_prod_db_network
    depends_on:
      postgres:
        condition: service_healthy
    command: |
      sh -c '
        echo "========================================="
        echo "  Backup Service Starting"
        echo "========================================="
        echo "Installing dcron..."
        apk add --no-cache dcron

        echo ""
        echo "Backup Configuration:"
        echo "  Database: ${POSTGRES_DB}"
        echo "  Schedule: ${BACKUP_SCHEDULE}"
        echo "  Retention: ${BACKUP_RETENTION_DAYS} days"
        echo "  Backup directory: /backups"
        echo ""

        echo "Setting up cron job..."
        echo "${BACKUP_SCHEDULE} /backup.sh >> /var/log/backup.log 2>&1" | crontab -

        echo "Configured cron jobs:"
        crontab -l

        echo ""
        echo "========================================="
        echo "  Running initial backup..."
        echo "========================================="
        /backup.sh || echo "Initial backup failed - check configuration"

        echo ""
        echo "========================================="
        echo "  Starting cron daemon"
        echo "========================================="
        echo "Cron will run backup at: ${BACKUP_SCHEDULE}"
        echo "To trigger manual backup, run:"
        echo "  docker exec scholarship_postgres_backup /backup.sh"
        echo ""
        echo "To view backup logs:"
        echo "  docker exec scholarship_postgres_backup cat /var/log/backup.log"
        echo ""

        # Start cron in foreground
        crond -f -l 2
      '
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'

  # =========================================================================
  # MONITORING SERVICES - Moved to docker-compose.prod-db-monitoring.yml
  # =========================================================================
  # Run monitoring services separately with:
  # docker-compose -f docker-compose.prod-db-monitoring.yml up -d

volumes:
  postgres_prod_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/scholarship/postgres/data
  postgres_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/scholarship/postgres/backups
  # BEFORE first `up`: mkdir -p /opt/scholarship/rustfs/data && chown -R
  # 10001:10001 /opt/scholarship/rustfs/data (RustFS runs as uid 10001) — the
  # migration script does both. Point volume snapshots/backups at this new
  # directory at cutover (scripts/backup.sh only covers postgres; object
  # storage backup is volume-level).
  rustfs_prod_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/scholarship/rustfs/data
  # Rollback escape hatch: the pre-RustFS MinIO data + TLS certs, left
  # untouched. Also the retention archive if bucket versioning was in use
  # (mc mirror copies latest versions only). To roll back, restore the old
  # minio/minio block and point it at these volumes. Remove only after the
  # compliance-retention decision is recorded (runbook "Versioning audit").
  minio_prod_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/scholarship/minio/data
  minio_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/scholarship/minio/config

networks:
  scholarship_prod_db_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.25.0.0/16
