services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: scholarship_postgres_dev
    environment:
      POSTGRES_DB: scholarship_db
      POSTGRES_USER: scholarship_user
      POSTGRES_PASSWORD: scholarship_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - scholarship_dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarship_user -d scholarship_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: scholarship_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - scholarship_dev_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RustFS Object Storage (S3-compatible MinIO replacement; service keeps the
  # `minio` name so the network alias — and every MINIO_ENDPOINT=minio:9000
  # consumer — stays unchanged. The backend still talks the generic S3 API via
  # the python `minio` SDK.)
  #
  # Tag pinned + verified 2026-06-11: RUSTFS_ACCESS_KEY/SECRET_KEY are honored
  # in docker mode on 1.0.0-beta.8 (positive test) AND the default
  # rustfsadmin/rustfsadmin creds are rejected (negative test — guards
  # upstream issue rustfs/rustfs#1058, where some builds ignored these envs).
  # `curl -f :9000/health` confirmed working inside this image.
  minio:
    image: rustfs/rustfs:1.0.0-beta.8
    container_name: scholarship_rustfs_dev
    ports:
      - "9000:9000"
      - "9001:9001"  # RustFS web console (same port MinIO's console used)
    environment:
      RUSTFS_ACCESS_KEY: minioadmin
      RUSTFS_SECRET_KEY: minioadmin123
      RUSTFS_VOLUMES: /data
    volumes:
      # RustFS cannot read MinIO's on-disk erasure format — fresh volume +
      # reseed (./scripts/reset_database.sh re-creates DB content incl. the
      # regulations PDF; it does NOT wipe this volume — to fully reset storage
      # use `docker volume rm scholarship-system_rustfs_dev_data` while down).
      # minio_dev_data is kept declared below as an instant-rollback escape
      # hatch; remove after bake-in.
      - rustfs_dev_data:/data
    networks:
      - scholarship_dev_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # FastAPI Backend with Hot Reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # The Dockerfile bakes email templates into the image via
      # `COPY --from=frontend_emails . /frontend/emails`. They live in
      # ../frontend/emails relative to the backend build context, so we
      # expose that path as a named build context here. (Required by
      # BuildKit / Compose Spec; supported in Compose v2.4+.)
      additional_contexts:
        frontend_emails: ./frontend/emails
    image: ghcr.io/anud18/scholarship-system-backend:${TAG:-latest}
    container_name: scholarship_backend_dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://scholarship_user:scholarship_pass@postgres:5432/scholarship_db
      DATABASE_URL_SYNC: postgresql://scholarship_user:scholarship_pass@postgres:5432/scholarship_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-for-development-only
      DEBUG: "true"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8000"
      ENVIRONMENT: development
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      # Was MINIO_BUCKET_NAME — a dead env: config.py's `minio_bucket` field
      # binds MINIO_BUCKET, so the old name was silently ignored and docker
      # dev always used the default "scholarship-files". Fixed to the real
      # name; value matches scripts/write_dev_env.sh so host-side and docker
      # runs finally agree. (Fresh storage volume + reseed makes the bucket
      # rename a non-event.)
      MINIO_BUCKET: scholarship-documents
      MINIO_SECURE: "false"
      # PII Encryption (issue #73): leave empty in dev to use the deterministic
      # dev key. In staging/prod a KMS sidecar populates these vars.
      PII_ENCRYPTION_KEYS: ""
      PII_ENCRYPTION_ACTIVE_VERSION: "v1"
      # Mock SSO Configuration
      ENABLE_MOCK_SSO: "true"
      MOCK_SSO_DOMAIN: dev.university.edu
      # SMTP: point at a closed local port so sends fail FAST (connection
      # refused) instead of hanging 60s against the unreachable campus relay
      # (140.113.7.200:25). Email delivery is not expected to work in dev;
      # what matters is that the failed attempt is recorded in email_history
      # immediately — e2e specs assert on that row.
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: "2525"
      # Student API Configuration (Mock)
      STUDENT_API_ENABLED: "true"
      STUDENT_API_BASE_URL: "http://mock-student-api:8080"
      STUDENT_API_ACCOUNT: "scholarship"
      STUDENT_API_HMAC_KEY: "4d6f636b4b657946726f6d48657841424344454647484a4b4c4d4e4f505152535455565758595a"
      STUDENT_API_TIMEOUT: "10.0"
      STUDENT_API_ENCODE_TYPE: "UTF-8"
      # Portal SSO - disabled in dev
      PORTAL_SSO_ENABLED: "false"
      # Frontend URLs
      FRONTEND_URL: http://localhost:3000  # External URL (for user redirects)
      FRONTEND_INTERNAL_URL: http://frontend:3000  # Internal Docker network URL (for API calls)
      # React Email Templates Directory (Docker mount point)
      REACT_EMAIL_TEMPLATES_DIR: /react-email-templates
    volumes:
      - ./backend:/app
      - ./frontend/emails:/react-email-templates:ro  # Mount React Email templates (read-only)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mock-student-api:
        condition: service_started
    networks:
      - scholarship_dev_network
    restart: unless-stopped

  # Next.js Frontend with Hot Reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    image: ghcr.io/anud18/scholarship-system-frontend:${TAG:-latest}
    container_name: scholarship_frontend_dev
    # Copies pdf.js worker into the bind-mounted public/ on every start.
    # The image's postinstall already runs the copy, but `./frontend:/app`
    # bind-mount shadows /app/public so we have to redo it against the host
    # public/ dir.
    command: sh -c "node scripts/copy-pdf-worker.mjs && node /app/node_modules/.bin/next dev --turbo"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
      # Next.js optimizations
      NEXT_TELEMETRY_DISABLED: 1
      # Override for Docker internal requests if needed
      INTERNAL_API_URL: http://backend:8000
      # Mock Student API URL for development
      MOCK_STUDENT_API_URL: http://mock-student-api:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
      - mock-student-api
    networks:
      - scholarship_dev_network
    restart: unless-stopped

  # Mock Student Database API - DEV ONLY
  mock-student-api:
    build:
      context: ./mock-student-api
      dockerfile: Dockerfile
    container_name: scholarship_mock_student_api_dev
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://scholarship_user:scholarship_pass@postgres:5432/scholarship_db
      MOCK_HMAC_KEY_HEX: 4d6f636b4b657946726f6d48657841424344454647484a4b4c4d4e4f505152535455565758595a
      STRICT_TIME_CHECK: "false"
      STRICT_ENCODE_CHECK: "false"
      TIME_TOLERANCE_MINUTES: "30"
    volumes:
      - ./mock-student-api:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scholarship_dev_network
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  rustfs_dev_data:
    driver: local
  # rollback escape hatch: the pre-RustFS MinIO data, left untouched. To roll
  # back, restore the old minio/minio image block and point it at this volume.
  # WARNING: `docker compose down -v` DELETES this volume along with the rest —
  # if you need the rollback path, avoid `-v` until the swap has baked in.
  # Remove after the RustFS swap has baked in.
  minio_dev_data:
    driver: local

networks:
  scholarship_dev_network:
    driver: bridge
