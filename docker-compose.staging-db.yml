services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: scholarship_postgres_staging
    environment:
      POSTGRES_DB: scholarship_db
      POSTGRES_USER: scholarship_user
      POSTGRES_PASSWORD: scholarship_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - scholarship_staging_db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarship_user -d scholarship_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: scholarship_minio_staging
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      # Allow Prometheus to scrape /minio/v2/metrics/cluster without a
      # bearer token. Newer MinIO images default to "jwt"; we want
      # "public" so Alloy → Prometheus pipeline works out of the box.
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_staging_data:/data
    networks:
      - scholarship_staging_db_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # =========================================================================
  # MONITORING SERVICES - Moved to docker-compose.staging-db-monitoring.yml
  # =========================================================================
  # Run monitoring services separately with:
  # docker-compose -f docker-compose.staging-db-monitoring.yml up -d

volumes:
  postgres_staging_data:
    driver: local
  minio_staging_data:
    driver: local

networks:
  scholarship_staging_db_network:
    driver: bridge
    name: scholarship_staging_db_network
