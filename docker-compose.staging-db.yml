services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: scholarship_postgres_staging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scholarship_db}
      POSTGRES_USER: ${POSTGRES_USER:-scholarship_user}
      # SECURITY: never hardcode the password. Must be supplied via the
      # environment (e.g. GitHub Actions secret / .env on the DB host).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5432:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - scholarship_staging_db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scholarship_user} -d ${POSTGRES_DB:-scholarship_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RustFS Object Storage (S3-compatible MinIO replacement; service keeps the
  # `minio` name so the network alias — and the backend's MINIO_ENDPOINT —
  # stays unchanged).
  #
  # CUTOVER (docs/deployment/rustfs-migration-runbook.md): RustFS cannot read
  # MinIO's on-disk erasure format. Before this block goes live, mirror the
  # data into /opt/scholarship/rustfs/data with
  # scripts/migrate_storage_to_rustfs.sh (backend stopped for the final delta
  # run). Do NOT carry old bucket policies over — RustFS enforces explicit
  # Deny against the owner too; buckets are private by default.
  minio:
    image: rustfs/rustfs:1.0.0-beta.8
    container_name: scholarship_rustfs_staging
    ports:
      - "9000:9000"
      - "9001:9001"  # RustFS web console (same port MinIO's console used)
    environment:
      # SECURITY: never hardcode credentials. Same host-side .env values as
      # before — only the variable names the image reads changed. The backend
      # keeps its MINIO_* secrets untouched.
      RUSTFS_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      RUSTFS_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      RUSTFS_VOLUMES: /data
    volumes:
      - rustfs_staging_data:/data
    networks:
      - scholarship_staging_db_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # =========================================================================
  # MONITORING SERVICES - Moved to docker-compose.staging-db-monitoring.yml
  # =========================================================================
  # Run monitoring services separately with:
  # docker-compose -f docker-compose.staging-db-monitoring.yml up -d

volumes:
  postgres_staging_data:
    driver: local
  # Bind-backed named volume so the migration script can pre-populate the
  # directory before compose ever creates the volume (avoids compose's
  # "not created by compose" ownership check on pre-made named volumes).
  # BEFORE first `up`: mkdir -p + chown -R 10001:10001 (RustFS uid) — the
  # migration script does both.
  rustfs_staging_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/scholarship/rustfs/data
  # Rollback escape hatch: the pre-RustFS MinIO data, left untouched. Also the
  # retention archive if bucket versioning was in use (mc mirror copies latest
  # versions only). To roll back, restore the old minio/minio block and point
  # it at this volume. Remove only after the compliance-retention decision is
  # recorded (runbook "Versioning audit").
  minio_staging_data:
    driver: local

networks:
  scholarship_staging_db_network:
    driver: bridge
    name: scholarship_staging_db_network
