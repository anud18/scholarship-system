    "aiofiles==24.1.0",
    "python-dateutil==2.8.2",
    "tenacity==9.1.2",
    
    # Caching
    "redis==7.0.1",
    
    # Task scheduling
    "apscheduler==3.10.4",
    "croniter==1.4.1",
    
    # Email services
    "fastapi-mail==1.4.1",
    "jinja2==3.1.6",
    
