name: d10
on: [workflow_dispatch]
permissions: { contents: read }
jobs:
  d:
    runs-on: self-hosted
    steps:
      - run: |
          echo "=== webhook errors since 5m ==="
          docker logs --since 5m monitoring_grafana 2>&1 | grep -iE 'webhook.*err|notif.*err|webhook response|github-issue' | tail -20
          echo
          echo "=== alertmanager-related success logs ==="
          docker logs --since 5m monitoring_grafana 2>&1 | grep -iE 'alertmanager.*fired|alertmanager.*sent|notify.*ok|notify.*success' | tail -10
