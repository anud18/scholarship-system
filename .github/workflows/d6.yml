name: Debug — capture exact webhook body Grafana sends
on: [workflow_dispatch]
permissions: { contents: read }
jobs:
  d:
    runs-on: self-hosted
    steps:
      - run: |
          # Replace url temporarily and look at log
          PAT=$(sudo cat /opt/scholarship/secrets/gh_pat)
          echo "=== try one minimal known-good payload manually ==="
          curl -sS -o /tmp/dr.txt -w "HTTP %{http_code}\n" -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $PAT" -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/anud18/scholarship-system/dispatches \
            -d '{"event_type":"monitoring-alert","client_payload":{"alertname":"manual-fixed","environment":"staging","severity":"info","status":"firing","summary":"manual","description":"manual","instance":"test","value":"0","fired_at":"2026-05-08","grafana_url":"https://example.com"}}'
          cat /tmp/dr.txt
          echo
          echo "=== try with bigger payload that simulates real grafana body ==="
          curl -sS -o /tmp/dr.txt -w "HTTP %{http_code}\n" -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $PAT" -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/anud18/scholarship-system/dispatches \
            -d "$(printf '{"event_type":"monitoring-alert","client_payload":{"alertname":"big-payload-test","severity":"warning","status":"firing","summary":"%s","description":"x","instance":"y","environment":"staging","value":"100","fired_at":"now","grafana_url":"https://example.com"}}' "$(printf 'a%.0s' {1..50000})")"
          cat /tmp/dr.txt
          echo
          echo "=== last 30 grafana errors with full body if logged ==="
          docker logs --since 5m monitoring_grafana 2>&1 | grep -iE 'webhook|dispatch|notif' | grep -v 'ngalert.sender' | tail -30
