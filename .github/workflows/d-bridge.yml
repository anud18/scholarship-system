name: d-bridge
on: [workflow_dispatch]
permissions: { contents: read }
jobs:
  d:
    runs-on: self-hosted
    steps:
      - run: |
          echo "=== bridge container status ==="
          docker ps --filter "name=monitoring_webhook_bridge" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
          echo
          echo "=== bridge logs (last 30 lines) ==="
          docker logs --tail 30 monitoring_webhook_bridge 2>&1 || echo "(container not running)"
          echo
          echo "=== test the bridge from inside monitoring network ==="
          docker run --rm --network monitoring_monitoring_network curlimages/curl:8.10.1 \
            -sS -o /dev/null -w "healthz HTTP %{http_code}\n" http://monitoring_webhook_bridge:8080/healthz
