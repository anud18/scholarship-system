name: Staging Evidence Report

# Builds an HTML gallery of staging-test evidence (PNG/JSON/TXT/JS) from a
# dedicated `evidence/<date>` orphan branch and uploads it as a 90-day
# Actions artifact. When triggered by a PR labeled `needs-evidence`, also
# posts a comment on the PR linking the artifact and the orphan branch
# tree view.
#
# Two trigger paths:
#   1. workflow_dispatch — operator picks the date manually
#   2. pull_request[labeled] — devs add `needs-evidence` to a PR; the
#      workflow builds from the latest published evidence/<date> branch
#      that matches the PR's date input (or the most recent one).

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Evidence date (YYYY-MM-DD) — must match an existing evidence/<date> branch"
        required: true
        type: string
  pull_request:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-comment:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'needs-evidence')
    runs-on: ubuntu-latest
    steps:
      # For workflow_dispatch we know the date; for pull_request we discover
      # the most recent evidence/* branch via `git ls-remote`.
      - name: Resolve evidence ref
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DATE="${{ github.event.inputs.date }}"
          else
            # Pick the most recently committed evidence/* branch from origin.
            DATE=$(gh api "repos/${{ github.repository }}/branches?per_page=100" \
              --jq '.[] | select(.name | startswith("evidence/")) | .name' \
              | sed 's|^evidence/||' | sort -r | head -n1)
          fi
          if [ -z "$DATE" ]; then
            echo "::error::no evidence/<date> branch found"
            exit 1
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "ref=evidence/$DATE" >> "$GITHUB_OUTPUT"
          echo "resolved evidence date: $DATE"

      - name: Checkout evidence branch
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Render inline HTML report
        run: |
          set -euo pipefail
          mkdir -p _evidence-out
          # Copy evidence tree into the output dir so the artifact zip is
          # self-contained even when run with --inline (PNGs are embedded
          # in the HTML, but the raw files are still useful for download).
          cp -r "docs/staging-tests/${{ steps.resolve.outputs.date }}" _evidence-out/raw
          node scripts/evidence/render.mjs \
            --date "${{ steps.resolve.outputs.date }}" \
            --src "docs/staging-tests/${{ steps.resolve.outputs.date }}" \
            --out _evidence-out \
            --inline

      - name: Upload evidence artifact
        id: upload
        uses: actions/upload-artifact@v6
        with:
          name: staging-evidence-${{ steps.resolve.outputs.date }}-${{ github.run_id }}
          path: _evidence-out
          retention-days: 90
          if-no-files-found: error

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          DATE: ${{ steps.resolve.outputs.date }}
          ARTIFACT_NAME: staging-evidence-${{ steps.resolve.outputs.date }}-${{ github.run_id }}
        with:
          script: |
            const { DATE, ARTIFACT_NAME } = process.env;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const treeUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/tree/evidence/${DATE}`;
            const indexUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/evidence/${DATE}/index.html`;
            const body = [
              `📸 **Staging evidence ready** for \`${DATE}\``,
              ``,
              `- **Artifact** (90-day retention): [${ARTIFACT_NAME}](${runUrl}#artifacts) — download zip, open \`index.html\`.`,
              `- **Branch tree** (permanent): [${treeUrl}](${treeUrl})`,
              `- **Rendered index** (raw file view): [${indexUrl}](${indexUrl})`,
              ``,
              `<sub>Generated by \`.github/workflows/staging-evidence.yml\`. To rebuild, push a new commit to \`evidence/${DATE}\` and re-trigger this workflow, or remove and re-add the \`needs-evidence\` label.</sub>`,
            ].join("\n");
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
