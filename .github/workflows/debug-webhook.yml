name: Debug — dump Grafana webhook delivery logs
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  debug:
    runs-on: self-hosted
    environment: staging
    steps:
      - name: Test GH_PAT scope
        run: |
          PAT=$(sudo cat /opt/scholarship/secrets/gh_pat)
          echo "=== PAT scopes ==="
          curl -sS -I -H "Authorization: token $PAT" https://api.github.com/repos/anud18/scholarship-system 2>&1 | grep -iE "x-oauth|x-accepted|status" | head -5
          echo
          echo "=== try manual dispatch ==="
          curl -sS -o /tmp/dispatch.txt -w "HTTP %{http_code}\n" \
            -X POST -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/anud18/scholarship-system/dispatches \
            -d '{"event_type":"webhook-pipeline-test","client_payload":{"alertname":"manual-test","environment":"staging","severity":"info","status":"firing","summary":"manual","description":"manual","instance":"test","value":"0","fired_at":"2026-05-08T05:00:00Z","grafana_url":"https://ss.test.nycu.edu.tw/monitoring"}}'
          cat /tmp/dispatch.txt
      - name: Grep grafana logs for webhook activity
        run: |
          echo "=== webhook / notifier / github-issue lines from last 200 ==="
          docker logs --tail 1000 monitoring_grafana 2>&1 | grep -iE 'webhook|notifier|github-issue|alertmanager.notification|sender|dispatch' | tail -30
          echo
          echo "=== alerting errors specifically ==="
          docker logs --tail 1000 monitoring_grafana 2>&1 | grep -iE 'level=error.*(alert|notif|webhook|sender)' | tail -10
