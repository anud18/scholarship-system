name: Debug — recent webhook errors
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  d:
    runs-on: self-hosted
    steps:
      - name: tail
        run: |
          echo "=== last 30 alertmanager / webhook errors ==="
          docker logs --since 5m monitoring_grafana 2>&1 | grep -iE 'webhook|github-issue|notif.*err' | tail -30
