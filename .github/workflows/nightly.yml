name: Nightly Long-Running Lane

# Phase 5 of the test-surface-hardening plan. Runs at 01:00 Taipei (17:00 UTC),
# manually triggerable. Three jobs cover the suites that are too slow,
# expensive, or noisy to keep on per-PR CI:
#   - backend-slow: pytest -m "slow or performance"
#   - e2e-full: full Playwright suite (no --grep), against
#     docker-compose.dev.yml
#   - audit-log-contract: per-method contract tests for
#     ApplicationAuditService — the legal-trail safety net
# On any failure, files (or appends to) a single nightly-failure issue
# inline via `gh issue create` instead of the existing repository_dispatch
# monitoring-alert flow (which is alerting-shaped, not nightly-shaped).

on:
  schedule:
    - cron: '0 17 * * *'    # 01:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: '22'
  BUN_VERSION: '1.3.11'
  PYTHON_VERSION: '3.13'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend-slow:
    name: Backend Slow + Performance
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Migrate + seed
        working-directory: ./backend
        env:
          DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/test_db"
          DATABASE_URL_SYNC: "postgresql://test_user:test_password@localhost:5432/test_db"
          APP_ENV: test
          TESTING: true
          SECRET_KEY: nightly-secret-key
          MINIO_ACCESS_KEY: nightly-minio
          MINIO_SECRET_KEY: nightly-minio
        run: |
          alembic upgrade head
          python -m app.seed || echo "seed completed"

      - name: Run -m "slow or performance"
        working-directory: ./backend
        env:
          DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/test_db"
          DATABASE_URL_SYNC: "postgresql://test_user:test_password@localhost:5432/test_db"
          APP_ENV: test
          TESTING: true
          SECRET_KEY: nightly-secret-key
          MINIO_ACCESS_KEY: nightly-minio
          MINIO_SECRET_KEY: nightly-minio
        run: |
          python -m pytest \
            -m "slow or performance" \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=0 \
            --tb=short \
            --maxfail=10 \
            -v

  audit-log-contract:
    name: Audit Log Contract
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Migrate
        working-directory: ./backend
        env:
          DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/test_db"
          DATABASE_URL_SYNC: "postgresql://test_user:test_password@localhost:5432/test_db"
          APP_ENV: test
          TESTING: true
          SECRET_KEY: nightly-secret-key
          MINIO_ACCESS_KEY: nightly-minio
          MINIO_SECRET_KEY: nightly-minio
        run: alembic upgrade head

      - name: Run audit-log contract suite
        working-directory: ./backend
        env:
          DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/test_db"
          DATABASE_URL_SYNC: "postgresql://test_user:test_password@localhost:5432/test_db"
          APP_ENV: test
          TESTING: true
          SECRET_KEY: nightly-secret-key
          MINIO_ACCESS_KEY: nightly-minio
          MINIO_SECRET_KEY: nightly-minio
        run: |
          python -m pytest \
            app/tests/test_application_audit_service_contract.py \
            --cov=app.services.application_audit_service \
            --cov-report=term-missing \
            --cov-fail-under=0 \
            --tb=short \
            -v

  e2e-full:
    name: E2E Full
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Bring up docker-compose.dev.yml
        run: |
          docker compose -f docker-compose.dev.yml pull --quiet || true
          docker compose -f docker-compose.dev.yml up -d --build
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8000/health > /dev/null 2>&1 \
               && curl -fsS http://localhost:3000 > /dev/null 2>&1; then
              echo "Services up after ${i}s"
              break
            fi
            sleep 2
          done

      - name: Migrate + seed inside backend container
        # /health returns 200 as soon as FastAPI has started — it doesn't
        # check schema. Without an explicit migrate step, Playwright tests
        # hit endpoints (mock-SSO login, etc.) that query `users` and 500
        # with `relation "users" does not exist`.
        run: |
          docker compose -f docker-compose.dev.yml exec -T backend alembic upgrade head
          docker compose -f docker-compose.dev.yml exec -T backend python -m app.seed || echo "seed completed"

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: |
          # Same workaround as ci.yml's E2E Smoke job (#190): the
          # docker compose up --build above sometimes leaves
          # frontend/node_modules with root ownership for a small
          # set of transitive deps (notably @adobe/*), which then
          # breaks the host-level `bun install` with EACCES. Reclaim
          # ownership before installing — no-op if already
          # runner-owned or absent.
          sudo chown -R "$(id -u):$(id -g)" node_modules 2>/dev/null || true
          bun install --frozen-lockfile
          bunx playwright install --with-deps chromium

      - name: Run full Playwright suite
        working-directory: ./frontend
        run: bunx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --tail=300 || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-nightly
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 14

      # On failure, keep a SECOND, run-scoped copy with the maximum retention
      # GitHub allows (90 days). The 14-day copy above (and the Pages site) get
      # overwritten by the next nightly — this one survives so the failure's
      # video/trace/screenshots stay available until the bug is fixed. The
      # file-issue-on-failure job links this artifact name in the issue, and
      # nightly-failure-cleanup.yml deletes it when that issue is closed (= the
      # failure is fixed), rather than waiting out the full 90 days.
      - name: Upload failure report (retained until the nightly-failure issue is closed)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-failure-report-${{ github.run_id }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 90

      - name: Tear down compose
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v || true

  # Publish the nightly Playwright HTML report to GitHub Pages so the e2e
  # results — including the screenshot / video / trace / backend-logs / db-state
  # attachments captured on failure — are browsable at
  # https://anud18.github.io/scholarship-system/ . Runs after e2e-full
  # regardless of pass/fail (`if: always()`): a failed run is exactly the
  # bug report we want to see.
  publish-e2e-report:
    name: Publish E2E report to GitHub Pages
    runs-on: ubuntu-latest
    needs: e2e-full
    if: always()
    permissions:
      pages: write       # deploy to the github-pages environment
      id-token: write    # OIDC token deploy-pages requires
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # Pages allows one deployment at a time — serialize, never cancel an
    # in-flight publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Download nightly Playwright report
        uses: actions/download-artifact@v6
        with:
          name: playwright-report-nightly
          path: report

      - name: Ensure the report has an index (placeholder if the run produced none)
        run: |
          if [ ! -f report/playwright-report/index.html ]; then
            echo "::warning::No Playwright HTML report in the artifact — publishing a placeholder so Pages stays valid."
            mkdir -p report/playwright-report
            printf '%s' '<!doctype html><meta charset="utf-8"><title>E2E report</title><h1>No e2e report from the last nightly run</h1><p>The full Playwright suite did not produce an HTML report (the run may have failed before tests started). Check the nightly workflow logs.</p>' > report/playwright-report/index.html
          fi

      - name: Upload the Playwright HTML report as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The HTML report is self-contained (attachments bundled under
          # playwright-report/data/), so publish that dir as the site root.
          path: report/playwright-report

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  file-issue-on-failure:
    name: File issue on failure
    runs-on: ubuntu-latest
    needs: [backend-slow, audit-log-contract, e2e-full]
    if: failure()
    permissions:
      issues: write

    steps:
      - name: gh issue create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          today=$(date -u +%F)
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Pre-create the label so `gh issue create --label nightly-failure`
          # doesn't 404 the very first time this fires on a fresh repo.
          # `gh label create` exits non-zero if the label already exists,
          # so swallow it.
          gh label create nightly-failure \
            --repo ${{ github.repository }} \
            --color "d73a4a" \
            --description "Auto-filed by nightly long-running lane" \
            2>/dev/null || true
          # Find an existing nightly-failure issue from today, otherwise create one.
          existing=$(gh issue list \
            --repo ${{ github.repository }} \
            --label nightly-failure \
            --state open \
            --search "in:title $today" \
            --json number \
            --jq '.[0].number' || echo '')
          # When e2e-full failed, point at the 90-day failure-report artifact so
          # the video/trace/screenshots stay reachable until this issue is
          # closed. nightly-failure-cleanup.yml greps the issue for this exact
          # `nightly-failure-report-<run_id>` name to delete it on close, so keep
          # the literal name in the body.
          evidence_line=""
          if [ "${{ needs.e2e-full.result }}" = "failure" ]; then
            evidence_line="- E2E failure evidence (video/trace/screenshots), retained until this issue is closed: download artifact \`nightly-failure-report-${{ github.run_id }}\` from the run page above, or browse the latest report at https://anud18.github.io/scholarship-system/"
          fi
          body=$(cat <<EOF
          One or more jobs in the nightly long-running lane failed today.

          - Run: $run_url
          - Job statuses:
            - backend-slow: ${{ needs.backend-slow.result }}
            - audit-log-contract: ${{ needs.audit-log-contract.result }}
            - e2e-full: ${{ needs.e2e-full.result }}
          $evidence_line

          (Auto-filed by .github/workflows/nightly.yml — Phase 5 of
          test-surface-hardening plan. Feel free to close once the
          underlying failure is fixed and a subsequent nightly is green.)
          EOF
          )
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo ${{ github.repository }} --body "$body"
          else
            gh issue create \
              --repo ${{ github.repository }} \
              --title "Nightly $today: long-running lane failed" \
              --body "$body" \
              --label nightly-failure
          fi
