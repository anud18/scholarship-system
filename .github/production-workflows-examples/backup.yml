# Production Database Backup Workflow
# Copy this file to the production repository at: .github/workflows/backup.yml
#
# =============================================================================
# ARCHITECTURE (two servers, DB VM has NO internet)
# =============================================================================
#
#   GitHub Actions
#     └── self-hosted runner on AP VM (internet + internal network)
#           └── SSH → DB VM (offline; reachable only from AP VM)
#                 ├── 1. run pg_dump via the postgres containers
#                 ├── 2. verify checksum + archive readability (pg_restore --list)
#                 └── 3. optional full restore test into a temporary database
#           └── SCP ← pull the verified dump back to the AP VM (off-server copy)
#
# Because the DB VM cannot reach the internet, it can NOT:
#   - run a GitHub Actions runner
#   - push backups to cloud/object storage
#   - report failures anywhere
# Therefore ALL orchestration happens from the AP VM runner, and the AP VM
# PULLS the backup over the internal network. The copy on the AP VM is the
# one IT staff transfer to external backup storage
# (see IT-BACKUP-TRANSFER-GUIDE.md).
#
# Backup layers after this workflow runs:
#   1. DB VM  /opt/scholarship/postgres/backups/YYYYMMDD/  (primary, 30 days)
#      - also written independently by the scholarship_postgres_backup
#        cron container at 02:00 (docker-compose.prod-db.yml)
#   2. AP VM  /opt/scholarship/backups/database/YYYYMMDD/  (off-server copy, 14 days)
#
# Required repository secrets (same as setting-env.yml, see SECRETS-SETUP-GUIDE.md):
#   DB_HOST          - DB VM hostname/IP (internal network)
#   DB_VM_USER       - SSH username on DB VM
#   DB_VM_SSH_KEY    - SSH private key for DB VM
#   DB_VM_SSH_PORT   - SSH port on DB VM (e.g. 8822)
#
# Restore (run on DB VM):
#   docker exec -i scholarship_postgres_prod pg_restore \
#     -U scholarship_user -d scholarship_db --clean --if-exists --no-owner \
#     /backups/YYYYMMDD/scholarship_db_backup_YYYYMMDD_HHMMSS.dump

name: Backup Production Database

on:
  schedule:
    # 19:30 UTC = 03:30 Asia/Taipei, deliberately AFTER the DB VM's own
    # in-container cron backup at 02:00 so the two never overlap.
    - cron: '30 19 * * *'
  workflow_dispatch:
    inputs:
      verify_restore:
        description: 'Run full restore test into a temporary database (slower)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: production-db-backup
  cancel-in-progress: false

env:
  # Bind mount of the postgres_backups volume on the DB VM (docker-compose.prod-db.yml)
  DB_BACKUP_DIR: /opt/scholarship/postgres/backups
  # Off-server copy on the AP VM - IT staff transfer to external storage from here
  AP_BACKUP_DIR: /opt/scholarship/backups/database
  # Staging dir on DB VM (backup files are root-owned; staged copies are chowned
  # to the SSH user so scp can read them)
  DB_STAGING_DIR: /tmp/scholarship-db-backup-stage
  DB_RETENTION_DAYS: 30
  AP_RETENTION_DAYS: 14

jobs:
  backup-database:
    name: Backup PostgreSQL Database
    # Self-hosted runner installed on the AP VM - the only machine that can
    # reach both GitHub and the offline DB VM.
    runs-on: [self-hosted, linux]
    timeout-minutes: 60

    steps:
      #########################################################################
      # STEP 1: Setup SSH connection to DB VM
      #########################################################################
      - name: Setup SSH to DB VM
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_VM_SSH_KEY: ${{ secrets.DB_VM_SSH_KEY }}
          DB_VM_SSH_PORT: ${{ secrets.DB_VM_SSH_PORT }}
        run: |
          echo "::add-mask::$DB_VM_SSH_KEY"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$DB_VM_SSH_KEY" > ~/.ssh/db_backup_key
          chmod 600 ~/.ssh/db_backup_key

          if ! grep -q "$DB_HOST" ~/.ssh/known_hosts 2>/dev/null; then
            ssh-keyscan -p "$DB_VM_SSH_PORT" -H "$DB_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          fi

      #########################################################################
      # STEP 2: Preflight checks on DB VM
      #########################################################################
      - name: Preflight checks on DB VM
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_VM_USER: ${{ secrets.DB_VM_USER }}
          DB_VM_SSH_PORT: ${{ secrets.DB_VM_SSH_PORT }}
        run: |
          set -o pipefail

          cat > preflight.sh <<'SCRIPT'
          set -euo pipefail
          BACKUP_DIR="$1"

          DOCKER=docker
          docker info >/dev/null 2>&1 || DOCKER="sudo docker"

          echo "Connected to DB VM: $(hostname)"

          if ! $DOCKER ps --format '{{.Names}}' | grep -qx scholarship_postgres_prod; then
            echo "::error::postgres container (scholarship_postgres_prod) is not running on DB VM"
            exit 1
          fi

          HEALTH=$($DOCKER inspect --format '{{.State.Health.Status}}' scholarship_postgres_prod 2>/dev/null || echo "unknown")
          echo "postgres container health: $HEALTH"
          if [ "$HEALTH" != "healthy" ]; then
            echo "::error::postgres container is not healthy (status: $HEALTH)"
            exit 1
          fi

          sudo mkdir -p "$BACKUP_DIR"
          AVAIL_KB=$(df -Pk "$BACKUP_DIR" | awk 'NR==2 {print $4}')
          echo "Free space at $BACKUP_DIR: $((AVAIL_KB / 1024)) MB"
          if [ "$AVAIL_KB" -lt 1048576 ]; then
            echo "::error::Less than 1 GB free on DB VM backup volume"
            exit 1
          fi

          echo "Preflight checks passed"
          SCRIPT

          ssh -p "$DB_VM_SSH_PORT" -i ~/.ssh/db_backup_key -o ConnectTimeout=10 \
            "$DB_VM_USER@$DB_HOST" "bash -s -- '$DB_BACKUP_DIR'" < preflight.sh

      #########################################################################
      # STEP 3: Create backup on DB VM
      #########################################################################
      - name: Create database backup on DB VM
        id: backup
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_VM_USER: ${{ secrets.DB_VM_USER }}
          DB_VM_SSH_PORT: ${{ secrets.DB_VM_SSH_PORT }}
        run: |
          set -o pipefail

          cat > run_backup.sh <<'SCRIPT'
          set -euo pipefail
          BACKUP_DIR="$1"
          RETENTION_DAYS="$2"
          STAGING="$3"

          DOCKER=docker
          docker info >/dev/null 2>&1 || DOCKER="sudo docker"

          # Prefer the maintained backup script in the cron sidecar container
          # (scripts/backup.sh: timestamped custom-format dump + sha256 + retention).
          if $DOCKER ps --format '{{.Names}}' | grep -qx scholarship_postgres_backup; then
            echo "Running backup via scholarship_postgres_backup container..."
            $DOCKER exec scholarship_postgres_backup /backup.sh
          else
            echo "Backup container not running - falling back to direct pg_dump"
            TS=$(date +%Y%m%d_%H%M%S)
            DATE=$(date +%Y%m%d)
            FILE="scholarship_db_backup_${TS}.dump"
            $DOCKER exec scholarship_postgres_prod sh -c "
              set -e
              mkdir -p /backups/${DATE}
              pg_dump -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" \
                --format=custom --compress=9 \
                --file=/backups/${DATE}/${FILE}
              cd /backups/${DATE}
              sha256sum ${FILE} > ${FILE}.sha256
              chmod 640 ${FILE} ${FILE}.sha256
            "
          fi

          # Retention: prune dated YYYYMMDD directories older than cutoff
          CUTOFF=$(date -d "${RETENTION_DAYS} days ago" +%Y%m%d)
          for dir in "$BACKUP_DIR"/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            if echo "$name" | grep -qE '^[0-9]{8}$' && [ "$name" -lt "$CUTOFF" ]; then
              echo "Pruning old backup directory: $name (retention: ${RETENTION_DAYS} days)"
              sudo rm -rf "$dir"
            fi
          done

          # Locate the dump that was just created
          LATEST=$(sudo find "$BACKUP_DIR" -type f -name 'scholarship_db_backup_*.dump' \
            -printf '%T@ %p\n' | sort -rn | head -n1 | cut -d' ' -f2-)
          if [ -z "$LATEST" ]; then
            echo "::error::No backup file found after backup run"
            exit 1
          fi

          # Sanity check: the newest dump must actually be from this run
          AGE=$(( $(date +%s) - $(sudo stat -c %Y "$LATEST") ))
          if [ "$AGE" -ge 900 ]; then
            echo "::error::Newest dump is ${AGE}s old - this run did not produce a new backup"
            exit 1
          fi

          # Stage dump + checksum for scp (backup files are root-owned 640)
          sudo rm -rf "$STAGING"
          mkdir -p "$STAGING"
          sudo cp "$LATEST" "${LATEST}.sha256" "$STAGING"/
          sudo chown "$(id -un)" "$STAGING"/*
          chmod 600 "$STAGING"/*

          SIZE=$(du -h "$STAGING/$(basename "$LATEST")" | cut -f1)
          echo "Backup created: $(basename "$LATEST") ($SIZE)"
          echo "RESULT_BACKUP_FILE=$(basename "$LATEST")"
          echo "RESULT_BACKUP_REL=${LATEST#"${BACKUP_DIR}"/}"
          echo "RESULT_BACKUP_SIZE=${SIZE}"
          SCRIPT

          ssh -p "$DB_VM_SSH_PORT" -i ~/.ssh/db_backup_key \
            "$DB_VM_USER@$DB_HOST" \
            "bash -s -- '$DB_BACKUP_DIR' '$DB_RETENTION_DAYS' '$DB_STAGING_DIR'" \
            < run_backup.sh | tee backup.log

          {
            echo "backup_file=$(grep '^RESULT_BACKUP_FILE=' backup.log | tail -n1 | cut -d= -f2-)"
            echo "backup_rel=$(grep '^RESULT_BACKUP_REL=' backup.log | tail -n1 | cut -d= -f2-)"
            echo "backup_size=$(grep '^RESULT_BACKUP_SIZE=' backup.log | tail -n1 | cut -d= -f2-)"
          } >> "$GITHUB_OUTPUT"

      #########################################################################
      # STEP 4: Verify backup integrity on DB VM
      #########################################################################
      - name: Verify backup integrity on DB VM
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_VM_USER: ${{ secrets.DB_VM_USER }}
          DB_VM_SSH_PORT: ${{ secrets.DB_VM_SSH_PORT }}
          BACKUP_REL: ${{ steps.backup.outputs.backup_rel }}
        run: |
          set -o pipefail

          # Full restore test: when requested via workflow_dispatch, or
          # automatically on Sundays for scheduled runs.
          FULL_RESTORE="${{ github.event.inputs.verify_restore || 'false' }}"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date +%u)" = "7" ]; then
            FULL_RESTORE="true"
          fi
          echo "Full restore test: $FULL_RESTORE"

          cat > verify_backup.sh <<'SCRIPT'
          set -euo pipefail
          STAGING="$1"
          REL="$2"
          FULL_RESTORE="$3"

          DOCKER=docker
          docker info >/dev/null 2>&1 || DOCKER="sudo docker"

          # 1. Checksum
          cd "$STAGING"
          sha256sum -c ./*.sha256
          echo "Checksum verification passed"

          # 2. Archive readability (cheap, every run)
          $DOCKER exec scholarship_postgres_prod sh -c "pg_restore --list '/backups/${REL}' >/dev/null"
          echo "Archive readability check passed (pg_restore --list)"

          # 3. Optional full restore into a temporary database
          if [ "$FULL_RESTORE" = "true" ]; then
            echo "Running full restore test into temporary database backup_verify..."
            $DOCKER exec scholarship_postgres_prod sh -c "
              set -e
              psql -U \"\$POSTGRES_USER\" -d postgres -c 'DROP DATABASE IF EXISTS backup_verify;'
              psql -U \"\$POSTGRES_USER\" -d postgres -c 'CREATE DATABASE backup_verify;'
              pg_restore -U \"\$POSTGRES_USER\" -d backup_verify --no-owner --no-privileges '/backups/${REL}'
            "
            TABLES=$($DOCKER exec scholarship_postgres_prod sh -c \
              "psql -U \"\$POSTGRES_USER\" -d backup_verify -t -A -c \"SELECT count(*) FROM information_schema.tables WHERE table_schema='public';\"")
            echo "Tables in restored database: $TABLES"
            $DOCKER exec scholarship_postgres_prod sh -c \
              "psql -U \"\$POSTGRES_USER\" -d postgres -c 'DROP DATABASE backup_verify;'"
            if [ "$TABLES" -le 0 ]; then
              echo "::error::Full restore test produced no tables"
              exit 1
            fi
            echo "Full restore test passed ($TABLES tables)"
          fi
          SCRIPT

          ssh -p "$DB_VM_SSH_PORT" -i ~/.ssh/db_backup_key \
            "$DB_VM_USER@$DB_HOST" \
            "bash -s -- '$DB_STAGING_DIR' '$BACKUP_REL' '$FULL_RESTORE'" \
            < verify_backup.sh

      #########################################################################
      # STEP 5: Pull off-server copy to AP VM
      # (DB VM cannot push anywhere - the AP VM must pull)
      #########################################################################
      - name: Pull backup copy to AP VM
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_VM_USER: ${{ secrets.DB_VM_USER }}
          DB_VM_SSH_PORT: ${{ secrets.DB_VM_SSH_PORT }}
          BACKUP_FILE: ${{ steps.backup.outputs.backup_file }}
        run: |
          set -o pipefail

          DEST_DIR="${AP_BACKUP_DIR}/$(date +%Y%m%d)"
          sudo mkdir -p "$DEST_DIR"
          sudo chown -R "$(id -un)" "$AP_BACKUP_DIR"
          chmod 750 "$AP_BACKUP_DIR"

          scp -P "$DB_VM_SSH_PORT" -i ~/.ssh/db_backup_key \
            "$DB_VM_USER@$DB_HOST:$DB_STAGING_DIR/$BACKUP_FILE" \
            "$DB_VM_USER@$DB_HOST:$DB_STAGING_DIR/$BACKUP_FILE.sha256" \
            "$DEST_DIR/"

          # Verify the transferred copy
          cd "$DEST_DIR"
          sha256sum -c "${BACKUP_FILE}.sha256"
          chmod 640 "$BACKUP_FILE" "${BACKUP_FILE}.sha256"
          echo "Off-server copy verified: $DEST_DIR/$BACKUP_FILE"

          # Retention: prune dated YYYYMMDD directories on the AP VM
          CUTOFF=$(date -d "${AP_RETENTION_DAYS} days ago" +%Y%m%d)
          for dir in "$AP_BACKUP_DIR"/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            if echo "$name" | grep -qE '^[0-9]{8}$' && [ "$name" -lt "$CUTOFF" ]; then
              echo "Pruning old AP VM copy: $name (retention: ${AP_RETENTION_DAYS} days)"
              rm -rf "$dir"
            fi
          done

          echo "Current AP VM backup inventory:"
          du -sh "$AP_BACKUP_DIR"/*/ 2>/dev/null || true

      #########################################################################
      # STEP 6: Cleanup (always runs)
      #########################################################################
      - name: Cleanup staging and SSH key
        if: always()
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_VM_USER: ${{ secrets.DB_VM_USER }}
          DB_VM_SSH_PORT: ${{ secrets.DB_VM_SSH_PORT }}
        run: |
          if [ -f ~/.ssh/db_backup_key ]; then
            ssh -p "$DB_VM_SSH_PORT" -i ~/.ssh/db_backup_key -o ConnectTimeout=10 \
              "$DB_VM_USER@$DB_HOST" "sudo rm -rf '$DB_STAGING_DIR'" || true
            rm -f ~/.ssh/db_backup_key
          fi
          rm -f preflight.sh run_backup.sh verify_backup.sh backup.log

      #########################################################################
      # STEP 7: Report
      #########################################################################
      - name: Generate backup report
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # Database Backup Report

          | | |
          |---|---|
          | **Status** | Success |
          | **Backup file** | \`${{ steps.backup.outputs.backup_file }}\` |
          | **Size** | ${{ steps.backup.outputs.backup_size }} |
          | **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          ## Backup locations

          | Location | Path | Retention |
          |---|---|---|
          | DB VM (primary) | \`${DB_BACKUP_DIR}/${{ steps.backup.outputs.backup_rel }}\` | ${DB_RETENTION_DAYS} days |
          | AP VM (off-server copy) | \`${AP_BACKUP_DIR}/$(date +%Y%m%d)/${{ steps.backup.outputs.backup_file }}\` | ${AP_RETENTION_DAYS} days |

          ## For IT department

          Transfer the AP VM copy to external backup storage
          (see IT-BACKUP-TRANSFER-GUIDE.md). Verify the checksum before transfer:

          \`\`\`bash
          cd ${AP_BACKUP_DIR}/$(date +%Y%m%d)
          sha256sum -c ${{ steps.backup.outputs.backup_file }}.sha256
          \`\`\`
          EOF

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production database backup failed (${new Date().toISOString().slice(0, 10)})`,
              body: [
                '## Database Backup Failure',
                '',
                `**Workflow run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Trigger**: ${context.eventName}`,
                `**Timestamp**: ${new Date().toISOString()}`,
                '',
                '## Action required',
                '',
                '1. Check the workflow logs for the failing step',
                '2. Verify the AP VM runner can SSH to the DB VM (`DB_HOST`/`DB_VM_SSH_PORT`)',
                '3. Verify the postgres container is healthy on the DB VM',
                '4. Check disk space on both the DB VM backup volume and the AP VM',
                '5. Re-run the workflow once fixed (`workflow_dispatch`)',
                '',
                'Note: the DB VM also runs an independent in-container cron backup at 02:00,',
                'so a single workflow failure does not mean there is no backup for today -',
                'but it does mean no verified off-server copy was created.',
              ].join('\n'),
              labels: ['production', 'backup', 'urgent'],
            });
